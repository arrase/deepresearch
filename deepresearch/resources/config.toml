[model]
model_name = "qwen3.5:9b"
base_url = "http://127.0.0.1:11434"
temperature_planner = 0.2
temperature_extractor = 0.0
temperature_evaluator = 0.0
temperature_synthesizer = 0.1
num_ctx = 100000
num_predict = 8192
timeout_seconds = 120

[browser]
image = "lightpanda/browser:nightly"
disable_telemetry = true
wait_ms = 7000
wait_until = "networkidle"
obey_robots = true
max_content_chars = 24000
min_useful_chars = 300
min_partial_chars = 120
request_timeout_seconds = 90

[search]
backend = "tavily"
api_key = ""
results_per_query = 5
max_raw_content_chars = 24000
fallback_backend = "duckduckgo"
user_agent = "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0 Safari/537.36"

[reporter]
output_reserve_ratio = 0.20
prompt_margin_tokens = 512

[dedup]
lexical_fingerprint = true
approximate_jaccard_threshold = 0.85
min_length_ratio = 0.8
max_length_ratio = 1.25

[discord]
token = ""
user_id = ""
output = "pdf"

[runtime]
max_iterations = 8
search_batch_size = 3
min_attempts_before_exhaustion = 3
max_cycles_without_new_evidence = 4
max_cycles_without_useful_sources = 4
max_consecutive_technical_failures = 3
semantic_eval_interval = 0
allow_dynamic_replan = true
verbosity = 0
llm_retry_attempts = 2
language = "English"

[langsmith]
enabled = false
tracing = true
endpoint = ""
api_key = ""
project = "DeepResearch"
